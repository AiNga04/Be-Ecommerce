server:
  port: 8080
  servlet:
    context-path: /api

vnpay:
  pay-url: ${PAY_URL}
  tmn-code: ${TMN_CODE}
  hash-secret: ${SECRET_KEY}
  return-url: ${RETURN_URL}
  version: ${VERSION:2.1.0}
  command: ${COMMAND:pay}
  order-type: ${ORDER_TYPE:other}

spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: aingaspkt@gmail.com
    password: wpri gwod lcdi mhxu
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: postgres
    password: 123123
#    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
#      password: your_password_if_any

  config:
    import: optional:file:.env[.properties]

  jpa:
    hibernate:
      ddl-auto: update          # tự tạo / cập nhật bảng khi entity thay đổi (dev mode)
    show-sql: true              # log câu SQL ra console
    properties:
      hibernate:
        format_sql: true        # định dạng SQL cho dễ đọc
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false         # khuyến nghị tắt để tránh lazy-loading lỗi

  # Nếu bạn dùng file .sql hoặc data.sql seed data
  sql:
    init:
      mode: always

logging:
  level:
    org.hibernate.SQL: debug         # log câu SQL
    org.hibernate.type.descriptor.sql.BasicBinder: trace  # log giá trị parameter


app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
    issuer: ${APP_JWT_ISSUER:zyna-app}
  activation:
    base-url: ${APP_ACTIVATION_BASE_URL:http://localhost:3000/activate}
    ttl-hours: ${APP_ACTIVATION_TTL_HOURS:24}
    jwt-secret: ${APP_ACTIVATION_JWT_SECRET:change-me-activation-secret-32bytes-long}
  mail:
    from: ${APP_MAIL_FROM:no-reply@zyna.dev}
